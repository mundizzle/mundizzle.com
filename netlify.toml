plugins = []

[[headers]]
for = "/*"

[headers.values]
Content-Security-Policy = "default-src 'self'; script-src 'none'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'; upgrade-insecure-requests"
Cross-Origin-Opener-Policy = "same-origin"
Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
X-Frame-Options = "DENY"

[[redirects]]
from = "/mundi-morgado-resume.md"
to = "/resume.md"
status = 200

[[redirects]]
from = "/mundi-morgado-resume.pdf"
to = "/resume.pdf"
status = 200

[build]
command = "npm run build"
publish = "dist"
